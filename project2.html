<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Strike Tic-Tac-Toe | AI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-purple: #7000ff;
            --bg-dark: #020205;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .cyber-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .cell:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-cyan);
            transform: scale(1.05);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.x-mark { color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); }
        .cell.o-mark { color: var(--neon-purple); text-shadow: 0 0 15px var(--neon-purple); }

        .status-panel {
            margin-bottom: 2rem;
            text-align: center;
        }

        .glow-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 25px;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .glow-btn:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .winner-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 2, 5, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .winner-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.15;
            background: linear-gradient(rgba(0, 240, 255, 0.1) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 240, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body>

    <div class="matrix-bg"></div>

    <!-- Header Navigation -->
    <div class="fixed top-0 w-full p-6 flex justify-between items-center max-w-6xl">
        <a href="index.html" class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
            <i class="fas fa-arrow-left"></i>
            <span class="uppercase tracking-widest text-xs font-bold">Back to Portfolio</span>
        </a>
        <div class="font-bold font-mono text-cyan-500 text-xs tracking-widest">AI_LOGIC: MINIMAX_V2.0</div>
    </div>

    <div class="status-panel">
        <h1 class="text-4xl font-black mb-2 font-['Orbitron'] tracking-tighter">TIC TAC <span class="text-[#00f0ff]">TOE</span></h1>
        <p class="text-gray-500 uppercase tracking-widest text-[10px] mb-6">Unbeatable AI Challenge</p>
        
        <div class="flex justify-center gap-8 mb-4">
            <div id="p1-score" class="text-center">
                <div class="text-[10px] text-cyan-400 font-bold uppercase">You (X)</div>
                <div class="text-2xl font-bold">0</div>
            </div>
            <div class="w-[1px] h-10 bg-white/10"></div>
            <div id="p2-score" class="text-center">
                <div class="text-[10px] text-purple-500 font-bold uppercase">AI (O)</div>
                <div class="text-2xl font-bold">0</div>
            </div>
        </div>
    </div>

    <div class="cyber-grid" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="mt-12 flex gap-4">
        <button onclick="resetGame()" class="glow-btn">Reset Grid</button>
    </div>

    <!-- Result Overlay -->
    <div class="winner-overlay" id="overlay">
        <h2 class="winner-text" id="winnerText">YOU WIN</h2>
        <p class="text-gray-400 mb-8 uppercase tracking-[0.5em]" id="winnerSub">System Compromised</p>
        <div class="flex gap-4">
            <button onclick="resetGame()" class="glow-btn">Play Again</button>
            <a href="index.html" class="px-6 py-[11px] border border-white/20 rounded-lg font-bold hover:bg-white/10 transition-all uppercase text-xs flex items-center">Exit to Portfolio</a>
        </div>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const overlay = document.getElementById('overlay');
        const winnerText = document.getElementById('winnerText');
        const winnerSub = document.getElementById('winnerSub');
        
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X"; // User is X
        let gameActive = true;
        let scores = { X: 0, O: 0 };

        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        cells.forEach(cell => {
            cell.addEventListener('click', handleCellClick);
        });

        function handleCellClick(e) {
            const index = e.target.dataset.index;
            if (board[index] !== "" || !gameActive || currentPlayer !== "X") return;

            makeMove(index, "X");
            
            if (gameActive) {
                setTimeout(aiMove, 500); // AI takes half a second to "think"
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            const cell = cells[index];
            cell.innerText = player;
            cell.classList.add('taken');
            cell.classList.add(player === "X" ? "x-mark" : "o-mark");

            if (checkWin(player)) {
                endGame(player);
            } else if (board.every(cell => cell !== "")) {
                endGame("draw");
            } else {
                currentPlayer = player === "X" ? "O" : "X";
            }
        }

        function aiMove() {
            // Minimax Algorithm for unbeatable AI
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < 9; i++) {
                if (board[i] === "") {
                    board[i] = "O";
                    let score = minimax(board, 0, false);
                    board[i] = "";
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            makeMove(move, "O");
        }

        function minimax(currBoard, depth, isMaximizing) {
            if (checkWin("O")) return 10 - depth;
            if (checkWin("X")) return depth - 10;
            if (currBoard.every(c => c !== "")) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currBoard[i] === "") {
                        currBoard[i] = "O";
                        let score = minimax(currBoard, depth + 1, false);
                        currBoard[i] = "";
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currBoard[i] === "") {
                        currBoard[i] = "X";
                        let score = minimax(currBoard, depth + 1, true);
                        currBoard[i] = "";
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWin(player) {
            return winPatterns.some(pattern => {
                return pattern.every(index => board[index] === player);
            });
        }

        function endGame(result) {
            gameActive = false;
            overlay.style.display = "flex";
            
            if (result === "draw") {
                winnerText.innerText = "DRAW";
                winnerText.style.color = "white";
                winnerSub.innerText = "Mutual Standoff Detected";
            } else {
                winnerText.innerText = result === "X" ? "YOU WIN" : "AI WINS";
                winnerText.style.color = result === "X" ? "#00f0ff" : "#7000ff";
                winnerSub.innerText = result === "X" ? "System Compromised" : "Neural Link Established";
                
                scores[result]++;
                updateScoreboard();
            }
        }

        function updateScoreboard() {
            document.querySelector('#p1-score div:last-child').innerText = scores.X;
            document.querySelector('#p2-score div:last-child').innerText = scores.O;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            overlay.style.display = "none";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.className = "cell";
            });
        }
    </script>
</body>
</html>
